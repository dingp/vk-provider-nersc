name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: vk-provider-nersc
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  HELM_CHART_PATH: ./chart

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Run tests
      run: go test ./...

    - name: Build binary
      run: make build

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: vk-provider-nersc-binary
        path: bin/vk-nersc

  docker:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Docker image
      run: docker build -t $REGISTRY/$IMAGE_NAME:latest .

    - name: Push Docker image
      if: github.event_name != 'pull_request'
      run: docker push $REGISTRY/$IMAGE_NAME:latest

  helm:
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Package Helm chart
      run: helm package $HELM_CHART_PATH --destination ./helm-packages

    - name: Upload Helm chart artifact
      uses: actions/upload-artifact@v4
      with:
        name: vk-nersc-helm-chart
        path: helm-packages/*.tgz

    # Optional: publish to Helm repo (e.g., GitHub Pages)
    - name: Deploy Helm chart to GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./helm-packages
