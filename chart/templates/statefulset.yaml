{{- if .Values.statefulset.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.statefulset.name }}
  labels:
    app: {{ .Values.statefulset.name }}
spec:
  serviceName: "{{ .Values.statefulset.name }}"
  replicas: {{ .Values.statefulset.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.statefulset.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.statefulset.name }}
      annotations:
        nersc.sf/project: "{{ .Values.statefulset.project }}"
        nersc.sf/inputSource: "{{ .Values.statefulset.inputSource }}"
{{- with .Values.statefulset.inputVolume }}
        nersc.sf/inputVolume: "{{ . }}"
{{- end }}
        nersc.sf/outputDest: "{{ .Values.statefulset.outputDest }}"
{{- with .Values.statefulset.outputVolume }}
        nersc.sf/outputVolume: "{{ . }}"
{{- end }}
        nersc.sf/stageOut: "{{ .Values.statefulset.stageOut }}"
    spec:
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.statefulset.nodeSelector | quote }}
      containers:
      - name: {{ .Values.statefulset.container.name }}
        image: {{ .Values.statefulset.container.image | quote }}
        command:
{{ toYaml .Values.statefulset.container.command | indent 10 }}
        args:
{{ toYaml .Values.statefulset.container.args | indent 10 }}
        volumeMounts:
{{- range .Values.statefulset.volumeMounts }}
        - name: {{ .name }}
          mountPath: {{ .mountPath | quote }}
          readOnly: {{ .readOnly }}
{{- end }}
      volumes:
{{- range .Values.statefulset.volumes }}
      - name: {{ .name }}
        persistentVolumeClaim:
          claimName: {{ .claimName | quote }}
{{- end }}
{{- end }}
