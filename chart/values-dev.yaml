# Development configuration for Virtual Kubelet NERSC provider

replicaCount: 1  # Single VK node for dev/testing

image:
  repository: ghcr.io/dingp/vk-provider-nersc
  tag: latest
  pullPolicy: Always  # Always pull latest image

sfApiEndpoint: "https://api.nersc.gov/api/v1.2"

vkNodeName: "perlmutter-vk-dev"

serviceAccount:
  name: vk-nersc-dev

rbac:
  create: true

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

nodeSelector:
  kubernetes.io/os: linux

extraEnv:
- name: VK_LOG_LEVEL
  value: "debug"

tolerations: []
affinity: {}

# StatefulSet in dev mode (optional)
statefulset:
  enabled: false
  name: hpc-stateful-dev
  replicas: 1
  account: m9999
  tokenSecretName: sf-api-token
  tokenSecretKey: token
  inputSource: ""
  inputVolume: data
  outputDest: ""
  outputVolume: data
  stageOut: "false"
  nodeSelector: perlmutter-vk-dev
  container:
    name: compute
    image: registry.example.com/compute:dev
    command: ["python"]
    args: ["compute.py"]
  volumeMounts:
    - name: data
      mountPath: /mnt/data
      readOnly: false
  volumes:
    - name: data
      claimName: hpc-data-pvc-dev
